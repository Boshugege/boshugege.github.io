name: Update Now Status

on:
  schedule:
    # Every 3 hours at minute 17 UTC (avoid top-of-hour load spikes)
    - cron: "17 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-now-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build now.json
        run: python scripts/build_now_status.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- now.json; then
            echo "No changes in now.json"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add now.json
          git commit -m "chore(now): update now.json"
          git push
